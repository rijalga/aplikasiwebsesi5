name: Run PHP Script
on: 
  push:
    branches: [ main ]
  workflow_dispatch:  # Bisa dijalankan manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  # Pilih versi PHP yang sesuai
          extensions: mbstring, pdo, mysql  # Tambahkan ekstensi yang dibutuhkan
          
      - name: Run PHP script
        run: php your-script.php  # Ganti dengan nama file PHP Anda
